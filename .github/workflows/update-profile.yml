name: Update Profile README

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:  # Allow manual triggering
  push:
    paths:
      - 'scripts/update_profile.py'
      - '.github/workflows/update-profile.yml'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit and push changes
    
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true  # Needed for push
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
    
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # No external dependencies - uses only standard library + gh cli
    
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
    
      - name: Run update script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_profile.py
    
      - name: Commit and push changes
        run: |
          git add assets/generated/ README.md
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "Update profile README [skip ci]"
            git push
          fi
        # The [skip ci] in commit message prevents infinite loops