<svg fill="none" viewBox="0 0 435 50" width="435" height="50" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Fira Code', 'Courier New', monospace;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 50px;
          color: #38BDF8;
          text-align: center;
        }

        .typewriter {
          display: inline-block;
          overflow: hidden;
          border-right: 2px solid #38BDF8;
          white-space: nowrap;
          margin: 0 auto;
          letter-spacing: 0.05em;
          width: 0;
          animation: 
            typing 12s steps(40, end) infinite,
            blink-caret .75s step-end infinite;
        }

        @keyframes typing {
          0%, 2%, 100% { width: 0; }
          5%, 20% { width: 22ch; }
          23%, 25% { width: 0; }
          28%, 45% { width: 18ch; }
          48%, 50% { width: 0; }
          53%, 70% { width: 22ch; }
          73%, 75% { width: 0; }
          78%, 95% { width: 20ch; }
          98% { width: 0; }
        }

        .typewriter::before {
          content: "Making software faster";
          animation: content-change 12s linear infinite;
        }

        @keyframes content-change {
          0%, 25% { content: "Making software faster"; }
          25.01%, 50% { content: "Deleting the lag"; }
          50.01%, 75% { content: "Automating the boring"; }
          75.01%, 100% { content: "Building tools that work"; }
        }

        @keyframes blink-caret {
          from, to { border-color: transparent }
          50% { border-color: #38BDF8 }
        }
      </style>

      <div class="container">
        <span class="typewriter"></span>
      </div>
    </div>
  </foreignObject>
</svg>
