<svg xmlns="http://www.w3.org/2000/svg" width="360" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3c72"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>
  <style>
    .l { font: 500 11px system-ui, sans-serif; fill: #64748b; letter-spacing: 1px; }
    .v { font: 700 28px system-ui, sans-serif; fill: #f8fafc; }
    .sub { font: 400 12px system-ui, sans-serif; fill: #475569; }
    .n { font: 600 13px system-ui, sans-serif; fill: #94a3b8; }
  </style>
  <rect width="360" height="160" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="360" height="3" rx="12" fill="url(#goldBar)" opacity="0.8"/>
  <rect x="0" y="0" width="3" height="160" fill="url(#blueBar)" opacity="0.4"/>

  <!-- Repos -->
  <text x="20" y="32" class="l">REPOSITORIES</text>
  <text x="20" y="62" class="v">37</text>
  <text x="20" y="80" class="sub">6 public · 31 private</text>

  <!-- Stars -->
  <text x="120" y="32" class="l">STARS</text>
  <text x="120" y="62" class="v">0</text>

  <!-- Languages -->
  <text x="200" y="32" class="l">LANGUAGES</text>
  <text x="200" y="62" class="v">6</text>

  <!-- Bar -->
  <text x="20" y="108" class="l">ACTIVITY</text>
  <rect x="20" y="116" width="320" height="8" rx="4" fill="#1e293b"/>
  <rect x="20" y="116" width="280" height="8" rx="4" fill="url(#blueBar)" opacity="0.8"/>
  <text x="20" y="148" class="n">37 repos with code</text>
</svg>