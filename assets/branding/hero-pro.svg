<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <!-- Deep navy background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </linearGradient>
    <!-- Royal blue fill -->
    <linearGradient id="blueFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72"/>
      <stop offset="100%" stop-color="#2a5298"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="70%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Radial glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1e3c72" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050d1a" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle dot pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#f59e0b" opacity="0.12"/>
    </pattern>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a5298" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <!-- Glow filter for text -->
    <filter id="glowText" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode/></feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      .title { font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace; font-size: 60px; font-weight: 800; fill: #f8fafc; letter-spacing: 10px; filter: url(#softShadow); }
      .subtitle { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 500; fill: #f59e0b; letter-spacing: 3px; }
      .tagline { font-family: system-ui, sans-serif; font-size: 14px; fill: #64748b; letter-spacing: 1px; }
      .tech { font-family: 'SF Mono', monospace; font-size: 11px; fill: #94a3b8; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bg)"/>
  <rect width="900" height="260" fill="url(#glow)"/>
  <rect width="900" height="260" fill="url(#grid)"/>
  <rect width="900" height="260" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#goldFill)"/>

  <!-- Left geometric frame -->
  <path d="M 20 30 L 20 10 L 50 10" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M 20 230 L 20 250 L 50 250" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Right geometric frame -->
  <path d="M 880 30 L 880 10 L 850 10" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M 880 230 L 880 250 L 850 250" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Diamond accents -->
  <g transform="translate(450, 130)" opacity="0.06">
    <polygon points="0,-100 80,0 0,100 -80,0" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <polygon points="0,-70 55,0 0,70 -55,0" fill="none" stroke="#f59e0b" stroke-width="1"/>
  </g>

  <!-- Main title -->
  <text x="450" y="105" text-anchor="middle" class="title">THEYONE</text>

  <!-- Gold underline -->
  <line x1="250" y1="118" x2="650" y2="118" stroke="url(#goldFill)" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="450" y="148" text-anchor="middle" class="subtitle">SOLO DEV · BUILDS TOOLS THAT JUST WORK</text>

  <!-- Tech pills -->
  <g transform="translate(450, 188)">
    <rect x="-280" y="-16" width="560" height="32" rx="16" fill="#0f172a" stroke="#1e3c72" stroke-width="1" opacity="0.8"/>
    <text x="-230" y="5" text-anchor="middle" class="tech" fill="#f59e0b">PYTHON</text>
    <circle cx="-60" cy="-3" r="2" fill="#f59e0b" opacity="0.4"/>
    <text x="-20" y="5" text-anchor="middle" class="tech" fill="#f59e0b">RUST</text>
    <circle cx="70" cy="-3" r="2" fill="#f59e0b" opacity="0.4"/>
    <text x="110" y="5" text-anchor="middle" class="tech" fill="#f59e0b">BASH</text>
    <circle cx="185" cy="-3" r="2" fill="#f59e0b" opacity="0.4"/>
    <text x="225" y="5" text-anchor="middle" class="tech" fill="#f59e0b">JAVASCRIPT</text>
  </g>

  <!-- Animated corner pulse dots -->
  <circle cx="70" cy="130" r="3" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="130" r="3" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom bar -->
  <rect x="0" y="257" width="900" height="3" fill="url(#goldFill)"/>

  <!-- Bottom tagline -->
  <text x="450" y="245" text-anchor="middle" class="tagline">NO DEPENDENCIES · NO ACCOUNT SIGNUP · SHIPS WHEN READY</text>
</svg>