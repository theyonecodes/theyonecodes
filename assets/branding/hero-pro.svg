<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d14"/>
      <stop offset="60%" stop-color="#0f1a2b"/>
      <stop offset="100%" stop-color="#080d14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="25%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="75%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3c72" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#d97706" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode/></feMerge>
    </filter>
    <style>
      .name {
        font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 64px;
        font-weight: 700;
        fill: url(#nameGrad);
        letter-spacing: 14px;
      }
      .tagline {
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 11px;
        font-weight: 500;
        fill: #d97706;
        letter-spacing: 5px;
      }
      .sub {
        font-family: 'SF Pro Text', system-ui, sans-serif;
        font-size: 13px;
        fill: #475569;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Base -->
  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>

  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#gold)"/>

  <!-- Bottom border -->
  <rect x="0" y="198" width="1200" height="2" fill="url(#gold)" opacity="0.6"/>

  <!-- Left accent -->
  <rect x="0" y="0" width="2" height="200" fill="url(#gold)" opacity="0.3"/>

  <!-- Right accent -->
  <rect x="1198" y="0" width="2" height="200" fill="url(#gold)" opacity="0.3"/>

  <!-- Gold underline -->
  <line x1="380" y1="105" x2="820" y2="105" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Name -->
  <text x="600" y="85" text-anchor="middle" class="name">THEYONE</text>

  <!-- Tagline -->
  <text x="600" y="135" text-anchor="middle" class="tagline">SYSTEMS  ·  SECURITY  ·  AUTOMATION</text>

  <!-- Sub text -->
  <text x="600" y="165" text-anchor="middle" class="sub">python · rust · bash · javascript</text>
</svg>