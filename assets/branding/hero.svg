<svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glass_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.02" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
      @keyframes grid { 0% { transform: perspective(200px) rotateX(60deg) translateY(0px); } 100% { transform: perspective(200px) rotateX(60deg) translateY(20px); } }
      .cube { animation: float 4s ease-in-out infinite; }
      .grid-lines { animation: grid 2s linear infinite; }
      .text-sync { animation: pulse 3s ease-in-out infinite; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0F172A" rx="20"/>
  <g class="grid-lines" opacity="0.3">
    <path d="M0 200 L800 200 M0 220 L800 220 M0 240 L800 240 M0 260 L800 260 M0 280 L800 280" stroke="#38BDF8" stroke-width="0.5"/>
    <path d="M100 200 L100 300 M200 200 L200 300 M300 200 L300 300 M400 200 L400 300 M500 200 L500 300 M600 200 L600 300 M700 200 L700 300" stroke="#38BDF8" stroke-width="0.5"/>
  </g>
  <rect x="50" y="50" width="700" height="200" rx="15" fill="url(#glass_grad)" stroke="#38BDF8" stroke-width="1"/>
  <g class="cube" style="animation-delay: 0s;">
    <rect x="100" y="80" width="40" height="40" rx="5" fill="#38BDF8" fill-opacity="0.2" stroke="#38BDF8" filter="url(#glow)"/>
  </g>
  <text x="50%" y="145" dominant-baseline="middle" text-anchor="middle" fill="#38BDF8" font-size="65" font-weight="900" class="text-sync" style="letter-spacing: 5px;">theyonecodes</text>
  <text x="50%" y="185" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="300" opacity="0.8" class="text-sync">ELITE ENGINEERING // FLOW OPTIMIZED</text>
  <rect x="50" y="50" width="700" height="200" rx="15" stroke="#38BDF8" stroke-width="2" fill="none" opacity="0.5" filter="url(#glow)"/>
</svg>