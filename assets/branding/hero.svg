<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Animated grid pulse -->
  <g stroke="#38bdf8" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="50" x2="1200" y2="50"><animate attributeName="opacity" values="0.15;0.3;0.15" dur="2s" repeatCount="indefinite"/></line>
    <line x1="0" y1="100" x2="1200" y2="100"><animate attributeName="opacity" values="0.15;0.35;0.15" dur="1.5s" repeatCount="indefinite"/></line>
    <line x1="0" y1="150" x2="1200" y2="150"><animate attributeName="opacity" values="0.15;0.3;0.15" dur="2.5s" repeatCount="indefinite"/></line>
  </g>

  <!-- Animated circuit lines -->
  <g stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.7">
    <path d="M50,100 L150,100 L180,70 L300,70" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,500;300,0" dur="3s" fill="freeze"/>
    </path>
    <path d="M1150,100 L1050,100 L1020,130 L900,130" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,500;300,0" dur="3s" fill="freeze" begin="1s"/>
    </path>
    <circle cx="300" cy="70" r="5" fill="#22d3ee" filter="url(#glow)">
      <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="130" r="5" fill="#22d3ee" filter="url(#glow)">
      <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Main Title: TheyOne -->
  <text x="600" y="85"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="56"
        font-weight="800"
        fill="url(#textGrad)"
        text-anchor="middle"
        filter="url(#softGlow)">
    TheyOne
  </text>

  <!-- Subtitle: Codes -->
  <text x="600" y="130"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="32"
        font-weight="600"
        fill="#e2e8f0"
        text-anchor="middle"
        letter-spacing="12">
    CODES
  </text>

  <!-- Accent bar with pulse -->
  <rect x="520" y="145" width="160" height="4" rx="2" fill="url(#accentGrad)" filter="url(#glow)">
    <animate attributeName="width" values="160;180;160" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="520;510;520" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Status indicator -->
  <g transform="translate(950, 50)">
    <circle cx="0" cy="0" r="8" fill="#22c55e" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;10;8" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="15" y="5" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#94a3b8">
      OPERATIONAL
    </text>
  </g>

  <!-- Decorative animated nodes -->
  <g fill="#38bdf8">
    <circle cx="80" cy="60" r="4" filter="url(#glow)">
      <animate attributeName="r" values="4;8;4" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="140" r="3" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="60" r="3" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="150" r="4" filter="url(#glow)">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner brackets -->
  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.6">
    <path d="M20,30 L20,20 L30,20"/>
    <path d="M1170,30 L1170,20 L1160,20"/>
    <path d="M20,170 L20,180 L30,180"/>
    <path d="M1170,170 L1170,180 L1160,180"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="175"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11"
        fill="#64748b"
        text-anchor="middle"
        letter-spacing="2">
    ZERO WASTE · MAXIMUM SPEED · DIGITAL SOVEREIGNTY
  </text>
</svg>