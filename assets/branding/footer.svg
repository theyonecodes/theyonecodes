<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="100%" height="60">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Divider line -->
  <line x1="0" y1="30" x2="1200" y2="30" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Corner nodes -->
  <circle cx="50" cy="30" r="3" fill="#38bdf8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="30" r="3" fill="#38bdf8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Center pulse -->
  <circle cx="600" cy="30" r="4" fill="#22c55e">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>