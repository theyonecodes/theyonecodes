<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 50" width="100%" height="50">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <!-- Top line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="url(#g)" stroke-width="1" opacity="0.35"/>
  <!-- Center pulse dot -->
  <circle cx="600" cy="0" r="3.5" fill="#f59e0b" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Side dots -->
  <circle cx="200" cy="0" r="2" fill="#f59e0b" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="1000" cy="0" r="2" fill="#f59e0b" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <!-- Corner ticks -->
  <path d="M 40 0 L 40 8 M 40 0 L 48 0" stroke="#f59e0b" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <path d="M 1160 0 L 1160 8 M 1160 0 L 1152 0" stroke="#f59e0b" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
</svg>